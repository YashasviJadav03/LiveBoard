# Render deployment config
# Deploy with: link this repo on render.com dashboard

services:
  - type: web
    name: liveboard-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liveboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: liveboard-redis
          type: redis
          property: connectionString
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: FRONTEND_URL
        value: "https://your-vercel-frontend-url.vercel.app" # Replace with your Vercel URL
    healthCheckPath: /health

  - type: redis
    name: liveboard-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: liveboard-db
    plan: free
    databaseName: liveboard
